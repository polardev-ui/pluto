<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pluto</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌑</text></svg>">
<style>
:root {
  --bg: #0d0d11;
  --surface: #141418;
  --surface-alt: #1a1a20;
  --surface-hover: #22222a;
  --border: #2a2a34;
  --border-light: #343440;
  --text: #eaeaf0;
  --text-dim: #9a9aa8;
  --text-muted: #5e5e6e;
  --accent: #7c6ff0;
  --accent-glow: rgba(124,111,240,0.15);
  --accent-dim: #5a4ec8;
  --green: #4cbf7a;
  --green-glow: rgba(76,191,122,0.15);
  --radius: 12px;
  --radius-sm: 8px;
  --radius-xs: 6px;
  --shadow: 0 8px 40px rgba(0,0,0,0.6);
  --ease: cubic-bezier(0.22, 1, 0.36, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --mono: "SF Mono", "Fira Code", monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ─── Tab Bar ─── */
#tab-bar {
  display: flex;
  align-items: flex-end;
  background: var(--surface);
  padding: 6px 6px 0;
  gap: 0;
  overflow-x: auto;
  overflow-y: hidden;
  flex-shrink: 0;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
  min-height: 38px;
  position: relative;
  z-index: 10;
}
#tab-bar::-webkit-scrollbar { height: 2px; }
#tab-bar::-webkit-scrollbar-track { background: transparent; }
#tab-bar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

#tab-list {
  display: flex;
  align-items: flex-end;
  gap: 2px;
}

.tab {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 10px 5px 12px;
  background: transparent;
  border: none;
  border-radius: var(--radius-sm) var(--radius-sm) 0 0;
  cursor: pointer;
  flex-shrink: 0;
  min-width: 0;
  max-width: 180px;
  position: relative;
  user-select: none;
  color: var(--text-muted);
  transition: background 0.2s var(--ease), color 0.2s var(--ease);
  font-size: 12.5px;
  line-height: 1.3;
}
.tab:hover {
  background: var(--surface-alt);
  color: var(--text-dim);
}
.tab.active {
  background: var(--bg);
  color: var(--text);
}
.tab.active::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 8px;
  right: 8px;
  height: 2px;
  background: var(--accent);
  border-radius: 1px 1px 0 0;
}
.tab .favicon {
  width: 14px; height: 14px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  font-size: 10px;
}
.tab .favicon img { width: 14px; height: 14px; border-radius: 2px; }
.tab .tab-title {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
  min-width: 0;
}
.tab .tab-close {
  width: 18px; height: 18px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  opacity: 0;
  transition: opacity 0.15s var(--ease), background 0.15s var(--ease), color 0.15s var(--ease);
  flex-shrink: 0;
}
.tab:hover .tab-close { opacity: 1; }
.tab .tab-close:hover {
  background: rgba(255,255,255,0.08);
  color: var(--text);
}

.tab.closing {
  animation: tabClose 0.2s var(--ease) forwards;
}
@keyframes tabClose {
  to { transform: scale(0.92); opacity: 0; width: 0; padding: 5px 0; overflow: hidden; }
}

#new-tab-btn {
  width: 26px; height: 26px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  border-radius: var(--radius-xs);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 300;
  flex-shrink: 0;
  margin-bottom: 4px;
  transition: background 0.15s var(--ease), color 0.15s var(--ease);
}
#new-tab-btn:hover {
  background: var(--surface-alt);
  color: var(--text);
}

#tab-spacer {
  flex: 1;
  min-width: 2px;
  margin-bottom: 4px;
  border-bottom: 1px solid transparent;
}

/* ─── Address Bar ─── */
#address-bar {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 6px 8px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  position: relative;
  z-index: 20;
}

.nav-btn {
  width: 30px; height: 30px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  border-radius: var(--radius-xs);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
  transition: background 0.15s var(--ease), color 0.15s var(--ease), transform 0.15s var(--ease);
}
.nav-btn:hover { background: var(--surface-alt); color: var(--text); transform: scale(1.05); }
.nav-btn:active { transform: scale(0.95); }
.nav-btn:disabled { opacity: 0.3; cursor: default; transform: none; }
.nav-btn:disabled:hover { background: transparent; color: var(--text-muted); }

#proxy-toggle {
  position: relative;
  transition: background 0.15s var(--ease), color 0.15s var(--ease), transform 0.15s var(--ease);
}
#proxy-toggle:hover { background: var(--surface-alt); transform: scale(1.05); }
#proxy-toggle .proxy-dot {
  position: absolute;
  top: 5px; right: 5px;
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 6px var(--green-glow);
  transition: background 0.2s var(--ease), box-shadow 0.2s var(--ease);
}

#url-input-wrap {
  flex: 1;
  position: relative;
  display: flex;
  align-items: center;
}
#url-input {
  width: 100%;
  padding: 6px 32px 6px 12px;
  background: var(--surface-alt);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 12.5px;
  font-family: var(--font);
  outline: none;
  transition: border-color 0.2s var(--ease), box-shadow 0.2s var(--ease);
}
#url-input:focus {
  border-color: var(--accent-dim);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
#url-input::placeholder { color: var(--text-muted); }
#url-indicator {
  position: absolute;
  right: 10px;
  display: flex;
  align-items: center;
  pointer-events: none;
}

/* ─── Proxy Config Popover ─── */
#proxy-config {
  position: absolute;
  top: calc(100% + 6px);
  right: 8px;
  width: 300px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 16px;
  opacity: 0;
  transform: translateY(-8px) scale(0.97);
  pointer-events: none;
  transition: opacity 0.25s var(--ease), transform 0.25s var(--ease);
  z-index: 100;
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
}
#proxy-config.show {
  opacity: 1;
  transform: translateY(0) scale(1);
  pointer-events: auto;
}
#proxy-config .pc-header {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-dim);
  margin-bottom: 12px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
#proxy-config .pc-field {
  margin-bottom: 10px;
}
#proxy-config .pc-field label {
  display: block;
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 4px;
  font-weight: 500;
}
#proxy-config .pc-field input,
#proxy-config .pc-field select {
  width: 100%;
  padding: 7px 10px;
  background: var(--surface-alt);
  border: 1px solid var(--border);
  border-radius: var(--radius-xs);
  color: var(--text);
  font-size: 12px;
  font-family: var(--font);
  outline: none;
  transition: border-color 0.2s var(--ease);
}
#proxy-config .pc-field input:focus,
#proxy-config .pc-field select:focus {
  border-color: var(--accent-dim);
}
#proxy-config .pc-field input::placeholder { color: var(--text-muted); }
#proxy-config .pc-field select {
  cursor: pointer;
  appearance: auto;
}
#proxy-config .pc-info {
  font-size: 11px;
  color: var(--text-muted);
  line-height: 1.5;
  margin-top: 8px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}

/* ─── Content Area ─── */
#content {
  flex: 1;
  position: relative;
  background: #fff;
  overflow: hidden;
}

.tab-content {
  position: absolute;
  inset: 0;
  opacity: 0;
  transform: scale(0.96) translateY(8px);
  pointer-events: none;
  transition: opacity 0.35s var(--ease), transform 0.35s var(--ease);
  z-index: 1;
  background: #fff;
}
.tab-content.active {
  opacity: 1;
  transform: scale(1) translateY(0);
  pointer-events: auto;
  z-index: 2;
}
.tab-content iframe {
  width: 100%; height: 100%;
  border: none;
  display: block;
}

/* ─── Start Page ─── */
.start-page {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  gap: 20px;
  padding: 40px;
}
.start-page .logo {
  font-size: 40px;
  font-weight: 700;
  letter-spacing: -0.5px;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 2px;
}
.start-page .logo svg { width: 36px; height: 36px; }
.start-page .logo .logotype {
  background: linear-gradient(135deg, #eaeaf0 0%, #8a7ae8 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.start-page .tagline {
  color: var(--text-muted);
  font-size: 13px;
  font-weight: 400;
  letter-spacing: 0.2px;
}
.start-page .search-box {
  display: flex;
  align-items: center;
  width: 100%;
  max-width: 480px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 2px;
  transition: border-color 0.3s var(--ease), box-shadow 0.3s var(--ease);
}
.start-page .search-box:focus-within {
  border-color: var(--accent-dim);
  box-shadow: 0 0 0 4px var(--accent-glow);
}
.start-page .search-box input {
  flex: 1;
  padding: 10px 18px;
  background: transparent;
  border: none;
  color: var(--text);
  font-size: 13.5px;
  font-family: var(--font);
  outline: none;
}
.start-page .search-box input::placeholder { color: var(--text-muted); }
.start-page .search-box .start-go {
  width: 32px; height: 32px;
  border: none;
  background: var(--accent);
  color: #fff;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-right: 3px;
  transition: background 0.2s var(--ease), transform 0.2s var(--ease);
}
.start-page .search-box .start-go:hover { background: var(--accent-dim); transform: scale(1.05); }
.start-page .search-box .start-go:active { transform: scale(0.95); }

.start-page .quick-links {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 6px;
}
.start-page .quick-link {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  text-decoration: none;
  color: var(--text-dim);
  font-size: 12px;
  transition: background 0.2s var(--ease), border-color 0.2s var(--ease), transform 0.2s var(--ease-spring), color 0.2s var(--ease);
}
.start-page .quick-link:hover {
  background: var(--surface-alt);
  border-color: var(--border-light);
  transform: translateY(-2px);
  color: var(--text);
}
.start-page .quick-link .ql-icon {
  font-size: 18px;
  line-height: 1;
  width: 20px;
  text-align: center;
}

/* ─── Error State ─── */
.tab-error {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  gap: 10px;
  padding: 40px;
  text-align: center;
  animation: fadeIn 0.3s var(--ease);
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.tab-error .err-icon { font-size: 28px; opacity: 0.4; margin-bottom: 4px; }
.tab-error .err-msg { font-size: 13px; max-width: 360px; line-height: 1.5; color: var(--text-dim); }
.tab-error .err-url { font-size: 11px; color: var(--text-muted); word-break: break-all; }

/* ─── Toast ─── */
#toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 10px 22px;
  border-radius: var(--radius);
  font-size: 12.5px;
  opacity: 0;
  transition: transform 0.4s var(--ease-spring), opacity 0.3s var(--ease);
  pointer-events: none;
  z-index: 100;
  white-space: nowrap;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  box-shadow: var(--shadow);
}
#toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}

/* ─── Context Menu ─── */
#context-menu {
  position: fixed;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 4px;
  min-width: 170px;
  box-shadow: var(--shadow);
  opacity: 0;
  transform: scale(0.95);
  pointer-events: none;
  transition: opacity 0.12s var(--ease), transform 0.12s var(--ease);
  z-index: 200;
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
}
#context-menu.show {
  opacity: 1;
  transform: scale(1);
  pointer-events: auto;
}
#context-menu .cm-item {
  padding: 7px 12px;
  font-size: 12.5px;
  color: var(--text-dim);
  border-radius: var(--radius-xs);
  cursor: pointer;
  transition: background 0.1s var(--ease), color 0.1s var(--ease);
}
#context-menu .cm-item:hover { background: var(--accent-glow); color: var(--accent); }
#context-menu .cm-sep {
  height: 1px;
  background: var(--border);
  margin: 4px 8px;
}

/* ─── Loading ─── */
.spinner {
  display: inline-block;
  width: 12px; height: 12px;
  border: 2px solid var(--border-light);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── Responsive ─── */
@media (max-width: 600px) {
  .tab { max-width: 110px; padding: 4px 6px 4px 8px; }
  .tab .tab-title { font-size: 11px; }
  .start-page .logo { font-size: 28px; }
  .start-page .logo svg { width: 28px; height: 28px; }
  #url-input { font-size: 11px; padding: 5px 28px 5px 10px; }
  .nav-btn { width: 28px; height: 28px; font-size: 13px; }
  #proxy-config { width: 260px; right: 4px; }
}
</style>
</head>
<body>

<div id="tab-bar">
  <div id="tab-list"></div>
  <button id="new-tab-btn" title="New Tab (Cmd+T)" aria-label="New tab">+</button>
  <div id="tab-spacer"></div>
</div>

<div id="address-bar">
  <button class="nav-btn" id="nav-back" title="Back" aria-label="Go back">&#x2190;</button>
  <button class="nav-btn" id="nav-fwd" title="Forward" aria-label="Go forward">&#x2192;</button>
  <button class="nav-btn" id="nav-refresh" title="Refresh" aria-label="Refresh">&#x21bb;</button>
  <button class="nav-btn" id="proxy-toggle" title="Proxy settings">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2l7 3v5c0 4-3 8-7 10-4-2-7-6-7-10V5l7-3z"/>
    </svg>
    <span class="proxy-dot"></span>
  </button>
  <div id="url-input-wrap">
    <input id="url-input" type="text" placeholder="Search or enter URL..." autocomplete="off" spellcheck="false">
    <span id="url-indicator"></span>
  </div>
  <div id="proxy-config">
    <div class="pc-header">Proxy Configuration</div>
    <div class="pc-field">
      <label>Server URL</label>
      <input type="text" id="proxy-url-input" placeholder="https://pluto.a.jrnm.app" spellcheck="false">
    </div>
    <div class="pc-field">
      <label>Backend Mode</label>
      <select id="proxy-mode-select">
        <option value="rewrite">Rewrite — full URL rewriting + JS interceptor</option>
        <option value="passthrough">Passthrough — strip headers + base tag</option>
        <option value="tunnel">Tunnel — CONNECT forward proxy (same as passthrough for iframes)</option>
        <option value="external">External — route through external proxy (Rammerhead, Titanium, etc.)</option>
      </select>
    </div>
    <div class="pc-field" id="pc-ext-field" style="display:none">
      <label>External Proxy URL</label>
      <input type="text" id="proxy-ext-url" placeholder="https://rammerhead.example.com" spellcheck="false">
    </div>
    <div class="pc-info" id="proxy-mode-info"></div>
  </div>
</div>

<div id="content"></div>
<div id="context-menu"></div>
<div id="toast"></div>

<script>
  (() => {
    'use strict';

    const CHANNEL = new BroadcastChannel('pluto-sync');
    const STORAGE_KEY = 'pluto-tabs';
    const PROXY_KEY = 'pluto-proxy';

    let tabs = [];
    let activeId = null;
    let idCounter = 1;
    let suppressSync = false;

    // ─── Proxy State ───
    let proxyServerUrl = 'https://pluto.a.jrnm.app';
    let proxyMode = 'rewrite';
    let proxyExtUrl = '';

    function loadProxyConfig() {
      try {
        const raw = localStorage.getItem(PROXY_KEY);
        if (raw) {
          const data = JSON.parse(raw);
          if (data.serverUrl) proxyServerUrl = data.serverUrl.replace(/\/+$/, '');
          if (data.mode) proxyMode = data.mode;
          if (data.extUrl) proxyExtUrl = data.extUrl.replace(/\/+$/, '');
        }
      } catch {}
    }

    function saveProxyConfig() {
      try {
        localStorage.setItem(PROXY_KEY, JSON.stringify({ serverUrl: proxyServerUrl, mode: proxyMode, extUrl: proxyExtUrl }));
      } catch {}
    }

    function proxyUrl(url) {
      if (!proxyServerUrl || !url || url === 'about:start' || url.startsWith(proxyServerUrl)) return url;
      let qs = '?url=' + encodeURIComponent(url) + '&mode=' + encodeURIComponent(proxyMode);
      if (proxyMode === 'external' && proxyExtUrl) qs += '&ext=' + encodeURIComponent(proxyExtUrl);
      return proxyServerUrl + '/proxy' + qs;
    }

    // ─── DOM refs ───
    const $ = id => document.getElementById(id);
    const tabList = $('tab-list');
    const content = $('content');
    const urlInput = $('url-input');
    const urlIndicator = $('url-indicator');
    const navBack = $('nav-back');
    const navFwd = $('nav-fwd');
    const navRefresh = $('nav-refresh');
    const newTabBtn = $('new-tab-btn');
    const toastEl = $('toast');
    const ctxMenu = $('context-menu');
    const proxyToggle = $('proxy-toggle');
    const proxyConfig = $('proxy-config');
    const proxyUrlInput = $('proxy-url-input');
    const proxyModeSelect = $('proxy-mode-select');
    const proxyExtUrlInput = $('proxy-ext-url');
    const pcExtField = $('pc-ext-field');

    let toastTimer = null;

    function toast(msg) {
      clearTimeout(toastTimer);
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2000);
    }

    function getDefaultTabs() {
      return [
        { id: 't1', title: 'New Tab', url: 'about:start', history: ['about:start'], historyIdx: 0 }
      ];
    }

    // ─── Persistence ───
    function save() {
      try {
        const data = { tabs, activeId, idCounter };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      } catch {}
    }

    function load() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return false;
        const data = JSON.parse(raw);
        if (!data.tabs || !data.tabs.length) return false;
        tabs = data.tabs;
        activeId = data.activeId || tabs[0].id;
        idCounter = data.idCounter || 100;
        return true;
      } catch { return false; }
    }

    // ─── Broadcast Sync ───
    function broadcast(action, payload) {
      if (suppressSync) return;
      CHANNEL.postMessage({ action, payload });
    }

    CHANNEL.onmessage = (e) => {
      const { action, payload } = e.data || {};
      if (!action) return;
      suppressSync = true;
      switch (action) {
        case 'tab-added':
          if (!tabs.some(t => t.id === payload.id)) { tabs.push(payload); renderTabs(); ensureContentFor(payload.id); }
          break;
        case 'tab-closed':
          if (tabs.length <= 1) break;
          tabs = tabs.filter(t => t.id !== payload.id);
          removeContentFor(payload.id);
          if (activeId === payload.id) activeId = tabs.length ? tabs[tabs.length - 1].id : null;
          renderTabs(); updateContentVisibility(); syncAddressBar();
          break;
        case 'tab-switched':
          if (tabs.some(t => t.id === payload.id)) { activeId = payload.id; renderTabs(); updateContentVisibility(); syncAddressBar(); }
          break;
        case 'tab-url-changed': {
          const tab = tabs.find(t => t.id === payload.id);
          if (tab) { tab.url = payload.url; if (payload.title) tab.title = payload.title; renderTabs(); syncAddressBar(); }
          break;
        }
        case 'tabs-replaced':
          tabs = payload.tabs; activeId = payload.activeId; idCounter = payload.idCounter; rebuildContent(); renderTabs(); syncAddressBar();
          break;
      }
      suppressSync = false;
    };

    // ─── Tab Management ───
    function genId() { return 't' + (idCounter++); }

    function addTab(url, title) {
      const id = genId();
      const normUrl = url || 'about:start';
      const tab = { id, title: title || 'New Tab', url: normUrl, history: [normUrl], historyIdx: 0 };
      tabs.push(tab);
      activeId = id;
      broadcast('tab-added', tab);
      save();
      renderTabs();
      createContentFor(tab);
      updateContentVisibility();
      syncAddressBar();
      scrollTabIntoView(id);
      if (normUrl === 'about:start') focusStartSearch(); else urlInput.focus();
      return id;
    }

    function closeTab(id) {
      if (tabs.length <= 1) { toast('Keep at least one tab open'); return; }
      const idx = tabs.findIndex(t => t.id === id);
      tabs = tabs.filter(t => t.id !== id);
      removeContentFor(id);
      if (activeId === id) activeId = tabs[Math.min(idx, tabs.length - 1)]?.id || null;
      broadcast('tab-closed', { id });
      save(); renderTabs(); updateContentVisibility(); syncAddressBar();
    }

    function switchTab(id) {
      if (id === activeId || !tabs.some(t => t.id === id)) return;
      activeId = id;
      broadcast('tab-switched', { id });
      save(); renderTabs(); updateContentVisibility(); syncAddressBar();
    }

    function getActiveTab() { return tabs.find(t => t.id === activeId) || null; }

    // ─── Content DOM Management ───
    function createContentFor(tab) {
      const div = document.createElement('div');
      div.className = 'tab-content' + (tab.id === activeId ? ' active' : '');
      div.dataset.contentId = tab.id;
      if (tab.url === 'about:start') {
        div.innerHTML = buildStartPageHTML();
        content.appendChild(div);
      } else {
        const iframe = document.createElement('iframe');
        iframe.src = proxyUrl(tab.url);
        iframe.setAttribute('sandbox', 'allow-scripts allow-forms allow-same-origin');
        iframe.loading = 'lazy';
        div.appendChild(iframe);
        content.appendChild(div);
        bindIframe(iframe, tab.id);
      }
    }

    function ensureContentFor(id) {
      if (content.querySelector(`.tab-content[data-content-id="${id}"]`)) return;
      const tab = tabs.find(t => t.id === id);
      if (tab) createContentFor(tab);
    }

    function removeContentFor(id) {
      const el = content.querySelector(`.tab-content[data-content-id="${id}"]`);
      if (el) el.remove();
    }

    function rebuildContent() {
      content.innerHTML = '';
      for (const tab of tabs) createContentFor(tab);
    }

    function updateContentVisibility() {
      content.querySelectorAll('.tab-content').forEach(el => {
        el.classList.toggle('active', el.dataset.contentId === activeId);
      });
    }

    // ─── Iframe lifecycle ───
    function bindIframe(iframe, tabId) {
      let loadTimer = setTimeout(() => showLoading(true), 600);
      iframe.addEventListener('load', () => {
        clearTimeout(loadTimer);
        showLoading(false);
        const tab = tabs.find(t => t.id === tabId);
        if (!tab) return;
        try {
          const doc = iframe.contentDocument;
          if (doc) {
            const title = doc.title;
            if (title && title !== tab.title) {
              tab.title = title;
              try { tab.favicon = doc.querySelector('link[rel*="icon"]')?.href || ''; } catch {}
              broadcast('tab-url-changed', { id: tabId, url: tab.url, title });
              save(); renderTabs();
            }
          }
        } catch {
          tab.title = tab.title || tab.url;
          renderTabs();
        }
        syncAddressBar();
      });
      iframe.addEventListener('error', () => {
        clearTimeout(loadTimer);
        showLoading(false);
        showIframeError(tabId);
      });
    }

    let loadingTimer = null;
    function showLoading(on) {
      if (on) {
        if (!loadingTimer) loadingTimer = setTimeout(() => { urlIndicator.innerHTML = '<span class="spinner"></span>'; loadingTimer = null; }, 400);
      } else {
        clearTimeout(loadingTimer); loadingTimer = null; urlIndicator.innerHTML = '';
      }
    }

    // ─── Render Tab Bar ───
    function renderTabs() {
      let html = '';
      for (const tab of tabs) {
        const isActive = tab.id === activeId;
        const favicon = tab.favicon || '';
        html += `<div class="tab${isActive ? ' active' : ''}" data-id="${tab.id}">
          <span class="favicon">${favicon ? `<img src="${escapeAttr(favicon)}" alt="">` : '<svg width="13" height="13" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="3.5" stroke="currentColor" stroke-width="1.2"/><path d="M7 0v14M0 7h14" stroke="currentColor" stroke-width="1" opacity="0.3"/></svg>'}</span>
          <span class="tab-title">${escapeHtml(tab.title || 'New Tab')}</span>
          <button class="tab-close" data-close-id="${tab.id}" aria-label="Close tab">✕</button>
        </div>`;
      }
      tabList.innerHTML = html;
      tabList.querySelectorAll('.tab').forEach(el => {
        el.addEventListener('click', (e) => { if (e.target.closest('.tab-close')) return; switchTab(el.dataset.id); });
        el.addEventListener('contextmenu', (e) => showContextMenu(e, el.dataset.id));
      });
      tabList.querySelectorAll('.tab-close').forEach(btn => {
        btn.addEventListener('click', (e) => { e.stopPropagation(); animateClose(btn.dataset.closeId); });
      });
    }

    function animateClose(id) {
      const el = tabList.querySelector(`.tab[data-id="${id}"]`);
      if (el) el.classList.add('closing');
      setTimeout(() => closeTab(id), 200);
    }

    function scrollTabIntoView(id) {
      requestAnimationFrame(() => {
        const el = tabList.querySelector(`.tab[data-id="${id}"]`);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      });
    }

    // ─── Start Page HTML ───
    function buildStartPageHTML() {
      return `<div class="start-page">
        <div class="logo">
          <svg viewBox="0 0 42 42" fill="none">
            <circle cx="21" cy="21" r="18" stroke="currentColor" stroke-width="1.5" opacity="0.2"/>
            <circle cx="21" cy="21" r="10" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="21" cy="21" r="4" fill="currentColor" opacity="0.5"/>
            <line x1="21" y1="3" x2="21" y2="12" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
            <line x1="21" y1="30" x2="21" y2="39" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
            <line x1="3" y1="21" x2="12" y2="21" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
            <line x1="30" y1="21" x2="39" y2="21" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
          </svg>
          <span class="logotype">Pluto</span>
        </div>
        <div class="tagline">A quiet browser for focused work</div>
        <div class="search-box">
          <input type="text" class="start-search" placeholder="Search or enter a URL...">
          <button class="start-go" aria-label="Go">
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="5,3 9,7 5,11"/>
            </svg>
          </button>
        </div>
        <div class="quick-links">
          <a class="quick-link" href="#" data-url="https://google.com"><span class="ql-icon">G</span>Google</a>
          <a class="quick-link" href="#" data-url="https://github.com"><span class="ql-icon">&#11088;</span>GitHub</a>
          <a class="quick-link" href="#" data-url="https://news.ycombinator.com"><span class="ql-icon">Y</span>HN</a>
          <a class="quick-link" href="#" data-url="https://reddit.com"><span class="ql-icon">R</span>Reddit</a>
          <a class="quick-link" href="#" data-url="https://wikipedia.org"><span class="ql-icon">W</span>Wiki</a>
        </div>
      </div>`;
    }

    function focusStartSearch() {
      requestAnimationFrame(() => {
        const input = content.querySelector('.tab-content.active .start-search');
        if (input) input.focus();
      });
    }

    // ─── Navigate ───
    function navigate(url) {
      const tab = getActiveTab();
      if (!tab) return;
      let normalized = (url || '').trim();
      if (!normalized || normalized === 'about:start') { updateTabUrl(tab, 'about:start', 'New Tab'); return; }
      if (!/^https?:\/\//i.test(normalized)) {
        if (/^[\w.-]+\.[a-z]{2,}/i.test(normalized)) normalized = 'https://' + normalized;
        else normalized = 'https://www.google.com/search?q=' + encodeURIComponent(normalized);
      }
      if (tab.historyIdx < tab.history.length - 1) tab.history = tab.history.slice(0, tab.historyIdx + 1);
      tab.history.push(normalized);
      tab.historyIdx++;
      updateTabUrl(tab, normalized, 'Loading...');
    }

    function updateTabUrl(tab, url, title) {
      tab.url = url;
      tab.title = title || tab.title;
      if (url === 'about:start') tab.favicon = '';
      broadcast('tab-url-changed', { id: tab.id, url, title: tab.title });
      save();

      const existing = content.querySelector(`.tab-content[data-content-id="${tab.id}"]`);
      if (url === 'about:start') {
        if (existing) existing.remove();
        const div = document.createElement('div');
        div.className = 'tab-content' + (tab.id === activeId ? ' active' : '');
        div.dataset.contentId = tab.id;
        div.innerHTML = buildStartPageHTML();
        content.appendChild(div);
        focusStartSearch();
      } else {
        const proxiedUrl = proxyUrl(url);
        if (existing) {
          existing.querySelectorAll('.tab-error').forEach(e => e.remove());
          let iframe = existing.querySelector('iframe');
          if (iframe) { iframe.style.display = ''; iframe.src = proxiedUrl; }
          else { existing.innerHTML = ''; iframe = document.createElement('iframe'); iframe.src = proxiedUrl; iframe.setAttribute('sandbox', 'allow-scripts allow-forms allow-same-origin'); iframe.loading = 'lazy'; existing.appendChild(iframe); bindIframe(iframe, tab.id); }
        } else {
          const div = document.createElement('div');
          div.className = 'tab-content' + (tab.id === activeId ? ' active' : '');
          div.dataset.contentId = tab.id;
          const iframe = document.createElement('iframe');
          iframe.src = proxiedUrl;
          iframe.setAttribute('sandbox', 'allow-scripts allow-forms allow-same-origin');
          iframe.loading = 'lazy';
          div.appendChild(iframe);
          content.appendChild(div);
          bindIframe(iframe, tab.id);
        }
      }
      updateContentVisibility();
      renderTabs();
      syncAddressBar();
    }

    function goBack() {
      const tab = getActiveTab();
      if (!tab || tab.historyIdx <= 0) return;
      tab.historyIdx--;
      updateTabUrl(tab, tab.history[tab.historyIdx], '');
    }

    function goForward() {
      const tab = getActiveTab();
      if (!tab || tab.historyIdx >= tab.history.length - 1) return;
      tab.historyIdx++;
      updateTabUrl(tab, tab.history[tab.historyIdx], '');
    }

    function refresh() {
      const tab = getActiveTab();
      if (!tab || tab.url === 'about:start') return;
      const iframe = content.querySelector(`.tab-content.active iframe`);
      if (iframe) { iframe.src = proxyUrl(tab.url); toast('Refreshing'); }
    }

    function showIframeError(tabId) {
      const container = content.querySelector(`.tab-content[data-content-id="${tabId}"]`);
      if (!container) return;
      const tab = tabs.find(t => t.id === tabId);
      if (!tab || container.querySelector('.tab-error')) return;
      const existing = container.querySelector('iframe');
      if (existing) existing.style.display = 'none';
      const err = document.createElement('div');
      err.className = 'tab-error';
      err.innerHTML = `<div class="err-icon">&#9888;</div>
        <div class="err-msg">This content couldn't be embedded — the site may block iframe loading.</div>
        <div class="err-url">${escapeHtml(tab.url)}</div>`;
      container.appendChild(err);
    }

    // ─── Proxy UI ───
    function updateProxyUI() {
      proxyUrlInput.value = proxyServerUrl;
      proxyModeSelect.value = proxyMode;
      proxyExtUrlInput.value = proxyExtUrl;
      pcExtField.style.display = proxyMode === 'external' ? '' : 'none';
      updateProxyModeInfo();
    }

    function updateProxyModeInfo() {
      const info = $('proxy-mode-info');
      switch (proxyMode) {
        case 'rewrite':
          info.textContent = 'Rewrites HTML/CSS/JS to proxy all URLs through the server. Injects a JS interceptor for fetch, XHR, and dynamic URLs. Best compatibility but binary assets may corrupt.';
          break;
        case 'passthrough':
          info.textContent = 'Fetches pages server-side, strips X-Frame-Options/CSP headers, injects <base href> for relative URLs. Content served unmodified — binary assets load directly from origin.';
          break;
        case 'tunnel':
          info.textContent = 'HTTP CONNECT forward proxy mode. For iframes this behaves like passthrough (same server-side fetch). Useful when paired with a system-level proxy configuration.';
          break;
        case 'external':
          info.textContent = 'Routes requests through an external proxy service (e.g., Rammerhead, Titanium Network). Enter the external proxy URL below. The external service handles the actual proxying.';
          break;
      }
    }

    // ─── Address Bar Sync ───
    function syncAddressBar() {
      const tab = getActiveTab();
      if (!tab) {
        urlInput.value = ''; urlInput.placeholder = 'No tab open'; urlIndicator.innerHTML = '';
        navBack.disabled = true; navFwd.disabled = true;
        return;
      }
      const displayUrl = tab.url === 'about:start' ? '' : tab.url;
      urlInput.value = displayUrl;
      urlInput.placeholder = 'Search or enter URL...';
      if (tab.url !== 'about:start') {
        urlIndicator.innerHTML = '<span style="color:var(--green);font-size:9px;display:flex;align-items:center;gap:3px"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2l7 3v5c0 4-3 8-7 10-4-2-7-6-7-10V5l7-3z"/></svg>' + proxyMode + '</span>';
      } else {
        urlIndicator.innerHTML = '';
      }
      navBack.disabled = tab.historyIdx <= 0;
      navFwd.disabled = tab.historyIdx >= (tab.history.length - 1);
    }

    // ─── Context Menu ───
    function showContextMenu(e, tabId) {
      e.preventDefault();
      ctxMenu.innerHTML = `<div class="cm-item" data-action="duplicate" data-id="${tabId}">Duplicate Tab</div>
        <div class="cm-item" data-action="close-others" data-id="${tabId}">Close Others</div>
        <div class="cm-item" data-action="close-right" data-id="${tabId}">Close to the Right</div>
        <div class="cm-sep"></div>
        <div class="cm-item" data-action="reload-all">Reload All Tabs</div>`;
      const maxX = window.innerWidth - 180;
      const maxY = window.innerHeight - 140;
      ctxMenu.style.left = Math.min(e.clientX, maxX) + 'px';
      ctxMenu.style.top = Math.min(e.clientY, maxY) + 'px';
      ctxMenu.classList.add('show');
      setTimeout(() => document.addEventListener('click', () => ctxMenu.classList.remove('show'), { once: true }), 0);
    }

    ctxMenu.addEventListener('click', (e) => {
      const item = e.target.closest('.cm-item');
      if (!item) return;
      const action = item.dataset.action;
      const id = item.dataset.id;
      ctxMenu.classList.remove('show');
      switch (action) {
        case 'duplicate': { const src = tabs.find(t => t.id === id); if (src) addTab(src.url, src.title + ' (copy)'); break; }
        case 'close-others': {
          const keep = tabs.find(t => t.id === id);
          if (!keep) break;
          tabs.forEach(t => { if (t.id !== keep.id) removeContentFor(t.id); });
          tabs = [keep]; activeId = keep.id;
          broadcast('tabs-replaced', { tabs, activeId, idCounter }); save(); renderTabs(); updateContentVisibility(); syncAddressBar();
          break;
        }
        case 'close-right': {
          const idx = tabs.findIndex(t => t.id === id);
          if (idx === -1) break;
          tabs.slice(idx + 1).forEach(t => removeContentFor(t.id));
          tabs = tabs.slice(0, idx + 1);
          if (!tabs.some(t => t.id === activeId)) activeId = tabs[tabs.length - 1].id;
          broadcast('tabs-replaced', { tabs, activeId, idCounter }); save(); renderTabs(); updateContentVisibility(); syncAddressBar();
          break;
        }
        case 'reload-all': content.querySelectorAll('iframe').forEach(f => { f.src = f.src; }); toast('Reloaded all tabs'); break;
      }
    });

    // ─── Event Binding ───
    urlInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); navigate(urlInput.value); urlInput.blur(); } });
    navBack.addEventListener('click', goBack);
    navFwd.addEventListener('click', goForward);
    navRefresh.addEventListener('click', refresh);
    newTabBtn.addEventListener('click', () => addTab());

    content.addEventListener('click', (e) => {
      const ql = e.target.closest('.quick-link');
      if (ql) { e.preventDefault(); navigate(ql.dataset.url); return; }
      const go = e.target.closest('.start-go');
      if (go) { const input = go.parentElement.querySelector('.start-search'); if (input && input.value.trim()) navigate(input.value.trim()); }
    });

    content.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { const input = e.target.closest('.start-search'); if (input && input.value.trim()) { e.preventDefault(); navigate(input.value.trim()); } }
    });

    // ─── Keyboard Shortcuts ───
    document.addEventListener('keydown', (e) => {
      const meta = e.metaKey || e.ctrlKey;
      if (meta && e.key === 't') { e.preventDefault(); addTab(); return; }
      if (meta && e.key === 'w') { e.preventDefault(); if (getActiveTab()) animateClose(activeId); return; }
      if (meta && e.key === 'Tab') { e.preventDefault(); const dir = e.shiftKey ? -1 : 1; const idx = tabs.findIndex(t => t.id === activeId); const next = (idx + dir + tabs.length) % tabs.length; if (tabs[next]) switchTab(tabs[next].id); return; }
      if (meta && e.key === 'l') { e.preventDefault(); urlInput.focus(); urlInput.select(); return; }
      if (meta && e.key === 'r') { e.preventDefault(); refresh(); return; }
      if (meta && e.key >= '1' && e.key <= '9') { e.preventDefault(); const idx = parseInt(e.key) - 1; if (idx < tabs.length) switchTab(tabs[idx].id); return; }
      if (e.key === 'Escape') ctxMenu.classList.remove('show');
    });

    // ─── Proxy Events ───
    proxyToggle.addEventListener('click', (e) => { e.stopPropagation(); proxyConfig.classList.toggle('show'); });
    document.addEventListener('click', (e) => { if (!proxyConfig.contains(e.target) && e.target !== proxyToggle) proxyConfig.classList.remove('show'); });

    proxyUrlInput.addEventListener('change', () => {
      const val = proxyUrlInput.value.trim().replace(/\/+$/, '');
      if (val) { proxyServerUrl = val; saveProxyConfig(); updateProxyUI(); toast('Proxy server updated'); }
    });

    proxyModeSelect.addEventListener('change', () => {
      proxyMode = proxyModeSelect.value;
      saveProxyConfig();
      updateProxyUI();
      toast('Proxy mode: ' + proxyMode);
    });

    proxyExtUrlInput.addEventListener('change', () => {
      const val = proxyExtUrlInput.value.trim().replace(/\/+$/, '');
      proxyExtUrl = val;
      saveProxyConfig();
      updateProxyUI();
      toast('External proxy URL updated');
    });

    // ─── Iframe URL sync via postMessage ───
    window.addEventListener('message', (e) => {
      if (e.data && e.data.type === 'pluto-url') {
        const msgUrl = e.data.url;
        if (!msgUrl) return;
        let originalUrl = msgUrl;
        const proxyPrefix = proxyServerUrl + '/proxy?url=';
        if (msgUrl.startsWith(proxyPrefix)) {
          try {
            const afterPrefix = msgUrl.slice(proxyPrefix.length);
            const ampIdx = afterPrefix.indexOf('&');
            originalUrl = decodeURIComponent(ampIdx === -1 ? afterPrefix : afterPrefix.slice(0, ampIdx));
          } catch { return; }
        }
        const tab = getActiveTab();
        if (tab && originalUrl !== tab.url && originalUrl.startsWith('http')) {
          tab.url = originalUrl;
          tab.title = tab.title || originalUrl;
          broadcast('tab-url-changed', { id: tab.id, url: originalUrl, title: tab.title });
          save(); renderTabs(); syncAddressBar();
        }
      }
    });

    // ─── Helpers ───
    function escapeHtml(s) { const d = document.createElement('div'); d.appendChild(document.createTextNode(s)); return d.innerHTML; }
    function escapeAttr(s) { return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

    // ─── Init ───
    function init() {
      loadProxyConfig();

      const proto = window.location.protocol;
      if (proto === 'file:') {
        console.warn('Pluto opened from file:// — iframe features are limited.');
        toast('Open via HTTP for full proxy support (file:// has restrictions)');
      }

      if (!proxyUrlInput.value && proto !== 'file:' && proto !== 'about:') {
        const currentOrigin = window.location.origin;
        if (currentOrigin && currentOrigin !== 'null') {
          fetch(currentOrigin + '/health').then(r => r.json()).then(data => {
            if (data.name === 'Pluto Proxy') {
              proxyServerUrl = currentOrigin;
              proxyUrlInput.value = proxyServerUrl;
              saveProxyConfig();
              updateProxyUI();
            }
          }).catch(() => {});
        }
      }

      if (!load()) { tabs = getDefaultTabs(); activeId = tabs[0].id; }
      updateProxyUI();
      rebuildContent();
      renderTabs();
      syncAddressBar();
      scrollTabIntoView(activeId);
      if (getActiveTab()?.url !== 'about:start') urlInput.focus();
    }

    init();
    window.addEventListener('beforeunload', () => { CHANNEL.close(); });
  })();
</script>
</body>
</html>
