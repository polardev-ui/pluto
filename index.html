<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pluto</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌑</text></svg>">
<style>
  :root {
    --bg: #161618;
    --surface: #1e1e20;
    --surface-alt: #252528;
    --surface-hover: #2c2c30;
    --border: #2e2e32;
    --text: #e8e8ed;
    --text-dim: #8e8e96;
    --text-muted: #5e5e66;
    --accent: #f0f0f5;
    --accent-dim: #c8c8d0;
    --radius: 12px;
    --radius-sm: 8px;
    --radius-xs: 6px;
    --shadow: 0 2px 20px rgba(0,0,0,0.5);
    --transition: 0.25s cubic-bezier(0.22, 1, 0.36, 1);
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── Tab Bar ─── */
  #tab-bar {
    display: flex;
    align-items: flex-end;
    background: var(--surface);
    padding: 8px 8px 0;
    gap: 0;
    overflow-x: auto;
    overflow-y: hidden;
    flex-shrink: 0;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
    min-height: 42px;
    position: relative;
    z-index: 10;
  }
  #tab-bar::-webkit-scrollbar { height: 3px; }
  #tab-bar::-webkit-scrollbar-track { background: transparent; }
  #tab-bar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  #tab-list {
    display: flex;
    align-items: flex-end;
  }

  .tab {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px 6px 12px;
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: var(--radius-sm) var(--radius-sm) 0 0;
    cursor: pointer;
    flex-shrink: 0;
    min-width: 0;
    max-width: 200px;
    position: relative;
    user-select: none;
    transition: background var(--transition), border-color var(--transition), transform var(--transition), opacity var(--transition);
    margin-right: -1px;
    transform-origin: bottom center;
  }
  .tab:hover { background: var(--surface-hover); border-color: #3a3a40; }
  .tab.active {
    background: var(--bg);
    border-color: #3a3a40;
    z-index: 2;
  }
  .tab.active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--bg);
    z-index: 3;
  }
  .tab.closing {
    transform: scaleY(0.6) translateY(8px);
    opacity: 0;
    pointer-events: none;
    transition-duration: 0.2s;
  }

  .tab .favicon {
    width: 14px; height: 14px;
    flex-shrink: 0;
    border-radius: 2px;
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
  }
  .tab .favicon img { width: 100%; height: 100%; border-radius: 2px; }

  .tab .tab-title {
    font-size: 12.5px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    min-width: 0;
    transition: color var(--transition);
    font-weight: 450;
  }
  .tab.active .tab-title { color: var(--text); }
  .tab:hover .tab-title { color: var(--text); }

  .tab .tab-close {
    width: 18px; height: 18px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
    opacity: 0;
    transition: background var(--transition), color var(--transition), opacity 0.15s;
    line-height: 1;
    padding: 0;
  }
  .tab:hover .tab-close { opacity: 0.6; }
  .tab .tab-close:hover { background: rgba(255,255,255,0.08); color: var(--text); opacity: 1; }
  .tab.active .tab-close { opacity: 0.35; }
  .tab.active .tab-close:hover { opacity: 1; }

  #new-tab-btn {
    width: 30px; height: 30px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    border-radius: var(--radius-xs);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    transition: background var(--transition), color var(--transition);
    margin-bottom: 2px;
    line-height: 1;
    padding: 0;
    font-weight: 300;
  }
  #new-tab-btn:hover { background: var(--surface-alt); color: var(--text); }
  #tab-spacer {
    flex: 1;
    border-bottom: 1px solid var(--border);
    align-self: stretch;
    margin-bottom: -1px;
  }

  /* ─── Address Bar ─── */
  #address-bar {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 7px 10px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    position: relative;
    z-index: 5;
  }

  .nav-btn {
    width: 30px; height: 30px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    border-radius: var(--radius-xs);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    transition: background var(--transition), color var(--transition);
    flex-shrink: 0;
    padding: 0;
    line-height: 1;
  }
  .nav-btn:hover { background: var(--surface-alt); color: var(--text); }
  .nav-btn:disabled { opacity: 0.25; cursor: default; }
  .nav-btn:disabled:hover { background: transparent; color: var(--text-muted); }

  #url-input-wrap {
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
  }
  #url-input {
    width: 100%;
    padding: 6px 32px 6px 14px;
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text);
    font-size: 12.5px;
    font-family: var(--font);
    outline: none;
    transition: border-color var(--transition), background var(--transition), box-shadow var(--transition);
  }
  #url-input:focus {
    border-color: #555;
    background: var(--surface);
    box-shadow: 0 0 0 3px rgba(255,255,255,0.04);
  }
  #url-input::placeholder { color: var(--text-muted); }

  #url-indicator {
    position: absolute;
    right: 10px;
    pointer-events: none;
    font-size: 10px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .spinner {
    width: 12px; height: 12px;
    border: 2px solid var(--border);
    border-top-color: var(--text-dim);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── Proxy Toggle & Config ─── */
  .proxy-btn {
    position: relative;
    font-size: 16px;
    line-height: 1;
    transition: color var(--transition), background var(--transition);
  }
  .proxy-btn.active {
    color: #6bba6b;
  }
  .proxy-btn.active svg .shield-fill {
    fill: #6bba6b;
    opacity: 0.3;
  }
  .proxy-btn .proxy-dot {
    position: absolute;
    top: 4px; right: 4px;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    transition: background var(--transition);
  }
  .proxy-btn.active .proxy-dot { background: #6bba6b; }

  #proxy-config {
    position: absolute;
    top: calc(100% + 4px);
    right: 10px;
    width: 280px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 14px;
    opacity: 0;
    transform: translateY(-6px) scale(0.97);
    pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
    z-index: 50;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
  }
  #proxy-config.show {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
  }
  #proxy-config .pc-header {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 10px;
    letter-spacing: 0.3px;
  }
  #proxy-config .pc-field {
    margin-bottom: 8px;
  }
  #proxy-config .pc-field label {
    display: block;
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  #proxy-config .pc-field input {
    width: 100%;
    padding: 7px 10px;
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: var(--radius-xs);
    color: var(--text);
    font-size: 12px;
    font-family: var(--font);
    outline: none;
    transition: border-color var(--transition);
  }
  #proxy-config .pc-field input:focus {
    border-color: #555;
  }
  #proxy-config .pc-field input::placeholder {
    color: var(--text-muted);
  }
  #proxy-config .pc-info {
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.4;
    margin-top: 6px;
  }
  #proxy-config .pc-toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    margin-top: 8px;
  }
  #proxy-config .pc-toggle-row span {
    font-size: 12px;
    color: var(--text-dim);
  }
  #proxy-config .pc-toggle-row .toggle-track {
    width: 34px; height: 20px;
    border-radius: 10px;
    background: var(--border);
    cursor: pointer;
    position: relative;
    transition: background var(--transition);
  }
  #proxy-config .pc-toggle-row .toggle-track.on {
    background: #4a8a4a;
  }
  #proxy-config .pc-toggle-row .toggle-track .toggle-knob {
    position: absolute;
    top: 2px; left: 2px;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: transform 0.2s ease, background var(--transition);
  }
  #proxy-config .pc-toggle-row .toggle-track.on .toggle-knob {
    transform: translateX(14px);
    background: #fff;
  }

  /* ─── Content Area ─── */
  #content {
    flex: 1;
    position: relative;
    background: #fff;
    overflow: hidden;
  }

  .tab-content {
    position: absolute;
    inset: 0;
    opacity: 0;
    transform: scale(0.97) translateY(6px);
    pointer-events: none;
    transition: opacity 0.28s cubic-bezier(0.22, 1, 0.36, 1),
                transform 0.28s cubic-bezier(0.22, 1, 0.36, 1);
    z-index: 1;
    background: #fff;
  }
  .tab-content.active {
    opacity: 1;
    transform: scale(1) translateY(0);
    pointer-events: auto;
    z-index: 2;
  }
  .tab-content iframe {
    width: 100%; height: 100%;
    border: none;
    display: block;
  }

  /* ─── Start Page ─── */
  .start-page {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    gap: 24px;
    padding: 40px;
  }
  .start-page .logo {
    font-size: 48px;
    font-weight: 700;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 4px;
  }
  .start-page .logo svg {
    width: 42px; height: 42px;
  }
  .start-page .logo .logotype {
    background: linear-gradient(135deg, #e8e8ed 0%, #a0a0a8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .start-page .tagline {
    color: var(--text-dim);
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.3px;
    opacity: 0.7;
  }
  .start-page .search-box {
    display: flex;
    align-items: center;
    width: 100%;
    max-width: 500px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 2px;
    transition: border-color var(--transition), box-shadow var(--transition);
  }
  .start-page .search-box:focus-within {
    border-color: #555;
    box-shadow: 0 0 0 4px rgba(255,255,255,0.04);
  }
  .start-page .search-box input {
    flex: 1;
    padding: 11px 20px;
    background: transparent;
    border: none;
    color: var(--text);
    font-size: 14px;
    font-family: var(--font);
    outline: none;
  }
  .start-page .search-box input::placeholder { color: var(--text-muted); }
  .start-page .search-box button {
    width: 34px; height: 34px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    border-radius: 50%;
    cursor: pointer;
    font-size: 14px;
    margin-right: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background var(--transition), color var(--transition);
  }
  .start-page .search-box button:hover { background: var(--surface-alt); color: var(--text); }

  .start-page .quick-links {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 8px;
  }
  .start-page .quick-link {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    text-decoration: none;
    color: var(--text-dim);
    font-size: 11.5px;
    transition: background var(--transition), border-color var(--transition), transform var(--transition), color var(--transition);
    min-width: 72px;
  }
  .start-page .quick-link:hover {
    background: var(--surface-alt);
    border-color: #3a3a40;
    transform: translateY(-2px);
    color: var(--text);
  }
  .start-page .quick-link .ql-icon {
    font-size: 20px;
    line-height: 1;
  }

  /* ─── Error / Blocked State ─── */
  .tab-error {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--text-dim);
    gap: 10px;
    padding: 40px;
    text-align: center;
  }
  .tab-error .err-icon { font-size: 32px; opacity: 0.5; margin-bottom: 4px; }
  .tab-error .err-msg { font-size: 13px; max-width: 380px; line-height: 1.5; color: var(--text-dim); }
  .tab-error .err-url { font-size: 11px; color: var(--text-muted); word-break: break-all; }

  /* ─── Toast ─── */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 10px 20px;
    border-radius: var(--radius);
    font-size: 13px;
    opacity: 0;
    transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.35s ease;
    pointer-events: none;
    z-index: 100;
    white-space: nowrap;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  #toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  /* ─── Context Menu ─── */
  #context-menu {
    position: fixed;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 4px;
    min-width: 170px;
    box-shadow: var(--shadow);
    opacity: 0;
    transform: scale(0.95) translateZ(0);
    pointer-events: none;
    transition: opacity 0.1s ease, transform 0.1s ease;
    z-index: 200;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }
  #context-menu.show {
    opacity: 1;
    transform: scale(1) translateZ(0);
    pointer-events: auto;
  }
  #context-menu .cm-item {
    padding: 7px 12px;
    font-size: 12.5px;
    color: var(--text-dim);
    border-radius: var(--radius-xs);
    cursor: pointer;
    transition: background var(--transition), color var(--transition);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #context-menu .cm-item:hover { background: var(--surface-alt); color: var(--text); }
  #context-menu .cm-sep {
    height: 1px;
    background: var(--border);
    margin: 4px 8px;
  }

  @media (max-width: 600px) {
    .tab { max-width: 100px; padding: 5px 6px 5px 8px; }
    .tab .tab-title { font-size: 11px; }
    .start-page .logo { font-size: 32px; }
    .start-page .logo svg { width: 32px; height: 32px; }
    #url-input { font-size: 11px; padding: 5px 28px 5px 10px; }
    .nav-btn { width: 26px; height: 26px; font-size: 13px; }
  }
</style>
</head>
<body>

  <div id="tab-bar">
    <div id="tab-list"></div>
    <button id="new-tab-btn" title="New Tab (Cmd+T)" aria-label="New tab">+</button>
    <div id="tab-spacer"></div>
  </div>

  <div id="address-bar">
    <button class="nav-btn" id="nav-back" title="Back" aria-label="Go back">&#x2190;</button>
    <button class="nav-btn" id="nav-fwd" title="Forward" aria-label="Go forward">&#x2192;</button>
    <button class="nav-btn" id="nav-refresh" title="Refresh" aria-label="Refresh">&#x21bb;</button>
    <button class="nav-btn proxy-btn" id="proxy-toggle" title="Proxy: Off">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path class="shield-fill" d="M12 2l7 3v5c0 4-3 8-7 10-4-2-7-6-7-10V5l7-3z"/>
      </svg>
      <span class="proxy-dot"></span>
    </button>
    <div id="url-input-wrap">
      <input id="url-input" type="text" placeholder="Search or enter URL..." autocomplete="off" spellcheck="false">
      <span id="url-indicator"></span>
    </div>
    <div id="proxy-config">
      <div class="pc-header">Proxy Settings</div>
      <div class="pc-field">
        <label>Server URL</label>
        <input type="text" id="proxy-url-input" placeholder="https://pluto.a.jrnm.app" spellcheck="false">
      </div>
      <div class="pc-toggle-row">
        <span>Proxy Active</span>
        <div class="toggle-track" id="proxy-toggle-switch">
          <div class="toggle-knob"></div>
        </div>
      </div>
      <div class="pc-info">Routes all browsing through the proxy to keep your IP anonymous. Pages are fetched server-side and rewritten in real-time.</div>
    </div>
  </div>

  <div id="content"></div>
  <div id="context-menu"></div>
  <div id="toast"></div>

<script>
  (() => {
    'use strict';

    const CHANNEL = new BroadcastChannel('pluto-sync');
    const STORAGE_KEY = 'pluto-tabs';
    const PROXY_KEY = 'pluto-proxy';

    let tabs = [];
    let activeId = null;
    let idCounter = 1;
    let suppressSync = false;

    // ─── Proxy State ───
    let proxyEnabled = false;
    let proxyServerUrl = 'https://pluto.a.jrnm.app';

    function loadProxyConfig() {
      try {
        const raw = localStorage.getItem(PROXY_KEY);
        if (raw) {
          const data = JSON.parse(raw);
          proxyEnabled = !!data.enabled;
          if (data.serverUrl) proxyServerUrl = data.serverUrl.replace(/\/+$/, '');
        }
      } catch {}
    }

    function saveProxyConfig() {
      try {
        localStorage.setItem(PROXY_KEY, JSON.stringify({ enabled: proxyEnabled, serverUrl: proxyServerUrl }));
      } catch {}
    }

    function proxyUrl(url) {
      if (!proxyEnabled || !proxyServerUrl || !url || url === 'about:start' || url.startsWith(proxyServerUrl)) return url;
      return proxyServerUrl + '/proxy?url=' + encodeURIComponent(url);
    }

    // ─── DOM refs ───
    const $ = id => document.getElementById(id);
    const tabList = $('tab-list');
    const content = $('content');
    const urlInput = $('url-input');
    const urlIndicator = $('url-indicator');
    const navBack = $('nav-back');
    const navFwd = $('nav-fwd');
    const navRefresh = $('nav-refresh');
    const newTabBtn = $('new-tab-btn');
    const toastEl = $('toast');
    const ctxMenu = $('context-menu');
    const proxyToggle = $('proxy-toggle');
    const proxyConfig = $('proxy-config');
    const proxyUrlInput = $('proxy-url-input');
    const proxyToggleSwitch = $('proxy-toggle-switch');

    let toastTimer = null;

    function toast(msg) {
      clearTimeout(toastTimer);
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2000);
    }

    function getDefaultTabs() {
      return [
        { id: 't1', title: 'New Tab', url: 'about:start', history: ['about:start'], historyIdx: 0 }
      ];
    }

    // ─── Persistence ───
    function save() {
      try {
        const data = { tabs, activeId, idCounter };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      } catch {}
    }

    function load() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return false;
        const data = JSON.parse(raw);
        if (!data.tabs || !data.tabs.length) return false;
        tabs = data.tabs;
        activeId = data.activeId || tabs[0].id;
        idCounter = data.idCounter || 100;
        return true;
      } catch { return false; }
    }

    // ─── Broadcast Sync ───
    function broadcast(action, payload) {
      if (suppressSync) return;
      CHANNEL.postMessage({ action, payload });
    }

    CHANNEL.onmessage = (e) => {
      const { action, payload } = e.data || {};
      if (!action) return;
      suppressSync = true;
      switch (action) {
        case 'tab-added':
          if (!tabs.some(t => t.id === payload.id)) {
            tabs.push(payload);
            renderTabs();
            ensureContentFor(payload.id);
          }
          break;
        case 'tab-closed':
          if (tabs.length <= 1) break;
          tabs = tabs.filter(t => t.id !== payload.id);
          removeContentFor(payload.id);
          if (activeId === payload.id) {
            activeId = tabs.length ? tabs[tabs.length - 1].id : null;
          }
          renderTabs();
          updateContentVisibility();
          syncAddressBar();
          break;
        case 'tab-switched':
          if (tabs.some(t => t.id === payload.id)) {
            activeId = payload.id;
            renderTabs();
            updateContentVisibility();
            syncAddressBar();
          }
          break;
        case 'tab-url-changed': {
          const tab = tabs.find(t => t.id === payload.id);
          if (tab) {
            tab.url = payload.url;
            if (payload.title) tab.title = payload.title;
            renderTabs();
            syncAddressBar();
          }
          break;
        }
        case 'tabs-replaced':
          tabs = payload.tabs;
          activeId = payload.activeId;
          idCounter = payload.idCounter;
          rebuildContent();
          renderTabs();
          syncAddressBar();
          break;
      }
      suppressSync = false;
    };

    // ─── Tab Management ───
    function genId() { return 't' + (idCounter++); }

    function addTab(url, title) {
      const id = genId();
      const normUrl = url || 'about:start';
      const tab = {
        id,
        title: title || 'New Tab',
        url: normUrl,
        history: [normUrl],
        historyIdx: 0
      };
      tabs.push(tab);
      activeId = id;
      broadcast('tab-added', tab);
      save();
      renderTabs();
      createContentFor(tab);
      updateContentVisibility();
      syncAddressBar();
      scrollTabIntoView(id);
      if (normUrl === 'about:start') {
        focusStartSearch();
      } else {
        urlInput.focus();
      }
      return id;
    }

    function closeTab(id) {
      if (tabs.length <= 1) { toast('Keep at least one tab open'); return; }
      const idx = tabs.findIndex(t => t.id === id);
      tabs = tabs.filter(t => t.id !== id);
      removeContentFor(id);
      if (activeId === id) {
        const newIdx = Math.min(idx, tabs.length - 1);
        activeId = tabs[newIdx]?.id || null;
      }
      broadcast('tab-closed', { id });
      save();
      renderTabs();
      updateContentVisibility();
      syncAddressBar();
    }

    function switchTab(id) {
      if (id === activeId || !tabs.some(t => t.id === id)) return;
      activeId = id;
      broadcast('tab-switched', { id });
      save();
      renderTabs();
      updateContentVisibility();
      syncAddressBar();
    }

    function getActiveTab() { return tabs.find(t => t.id === activeId) || null; }

    // ─── Content DOM Management ───
    // Each tab-content div persists in the DOM so iframes stay alive across tab switches.

    function createContentFor(tab) {
      const div = document.createElement('div');
      div.className = 'tab-content' + (tab.id === activeId ? ' active' : '');
      div.dataset.contentId = tab.id;
      if (tab.url === 'about:start') {
        div.innerHTML = buildStartPageHTML();
        content.appendChild(div);
      } else {
        const iframe = document.createElement('iframe');
        iframe.src = proxyUrl(tab.url);
        iframe.setAttribute('sandbox', 'allow-scripts allow-forms allow-same-origin');
        iframe.loading = 'lazy';
        div.appendChild(iframe);
        content.appendChild(div);
        bindIframe(iframe, tab.id);
      }
    }

    function ensureContentFor(id) {
      if (content.querySelector(`.tab-content[data-content-id="${id}"]`)) return;
      const tab = tabs.find(t => t.id === id);
      if (tab) createContentFor(tab);
    }

    function removeContentFor(id) {
      const el = content.querySelector(`.tab-content[data-content-id="${id}"]`);
      if (el) el.remove();
    }

    function rebuildContent() {
      content.innerHTML = '';
      for (const tab of tabs) {
        createContentFor(tab);
      }
    }

    function updateContentVisibility() {
      content.querySelectorAll('.tab-content').forEach(el => {
        el.classList.toggle('active', el.dataset.contentId === activeId);
      });
    }

    // ─── Iframe lifecycle ───
    function bindIframe(iframe, tabId) {
      let loadTimer = setTimeout(() => {
        showLoading(true);
      }, 600);

      iframe.addEventListener('load', () => {
        clearTimeout(loadTimer);
        showLoading(false);
        const tab = tabs.find(t => t.id === tabId);
        if (!tab) return;
        try {
          const doc = iframe.contentDocument;
          if (doc) {
            const title = doc.title;
            if (title && title !== tab.title) {
              tab.title = title;
              try {
                const icon = doc.querySelector('link[rel*="icon"]');
                tab.favicon = icon ? icon.href : '';
              } catch {}
              broadcast('tab-url-changed', { id: tabId, url: tab.url, title });
              save();
              renderTabs();
            }
          }
        } catch {
          tab.title = tab.title || tab.url;
          renderTabs();
        }
        syncAddressBar();
      });

      iframe.addEventListener('error', () => {
        clearTimeout(loadTimer);
        showLoading(false);
        showIframeError(tabId);
      });
    }

    let loadingTimer = null;
    function showLoading(on) {
      if (on) {
        if (!loadingTimer) {
          loadingTimer = setTimeout(() => {
            urlIndicator.innerHTML = '<span class="spinner"></span>';
            loadingTimer = null;
          }, 400);
        }
      } else {
        clearTimeout(loadingTimer);
        loadingTimer = null;
        urlIndicator.innerHTML = '';
      }
    }

    // ─── Render Tab Bar ───
    function renderTabs() {
      let html = '';
      for (const tab of tabs) {
        const isActive = tab.id === activeId;
        const favicon = tab.favicon || '';
        html += `
          <div class="tab${isActive ? ' active' : ''}" data-id="${tab.id}">
            <span class="favicon">${favicon ? `<img src="${escapeAttr(favicon)}" alt="">` : '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="3.5" stroke="currentColor" stroke-width="1.2"/><path d="M7 0v14M0 7h14" stroke="currentColor" stroke-width="1" opacity="0.4"/></svg>'}</span>
            <span class="tab-title">${escapeHtml(tab.title || 'New Tab')}</span>
            <button class="tab-close" data-close-id="${tab.id}" aria-label="Close tab">&#x2715;</button>
          </div>`;
      }
      tabList.innerHTML = html;

      tabList.querySelectorAll('.tab').forEach(el => {
        el.addEventListener('click', (e) => {
          if (e.target.closest('.tab-close')) return;
          switchTab(el.dataset.id);
        });
        el.addEventListener('contextmenu', (e) => showContextMenu(e, el.dataset.id));
      });
      tabList.querySelectorAll('.tab-close').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          animateClose(btn.dataset.closeId);
        });
      });
    }

    function animateClose(id) {
      const el = tabList.querySelector(`.tab[data-id="${id}"]`);
      if (el) el.classList.add('closing');
      setTimeout(() => closeTab(id), 200);
    }

    function scrollTabIntoView(id) {
      requestAnimationFrame(() => {
        const el = tabList.querySelector(`.tab[data-id="${id}"]`);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      });
    }

    // ─── Start Page HTML ───
    function buildStartPageHTML() {
      return `
        <div class="start-page">
          <div class="logo">
            <svg viewBox="0 0 42 42" fill="none">
              <circle cx="21" cy="21" r="18" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>
              <circle cx="21" cy="21" r="10" stroke="currentColor" stroke-width="1.5"/>
              <circle cx="21" cy="21" r="4" fill="currentColor" opacity="0.6"/>
              <line x1="21" y1="3" x2="21" y2="12" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
              <line x1="21" y1="30" x2="21" y2="39" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
              <line x1="3" y1="21" x2="12" y2="21" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
              <line x1="30" y1="21" x2="39" y2="21" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
            </svg>
            <span class="logotype">Pluto</span>
          </div>
          <div class="tagline">A quiet browser for focused work</div>
          <div class="search-box">
            <input type="text" class="start-search" placeholder="Search or enter URL...">
            <button class="start-go" aria-label="Go">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="5,3 9,7 5,11"/>
              </svg>
            </button>
          </div>
          <div class="quick-links">
            <a class="quick-link" href="#" data-url="https://google.com"><span class="ql-icon">G</span>Google</a>
            <a class="quick-link" href="#" data-url="https://github.com"><span class="ql-icon">&#11088;</span>GitHub</a>
            <a class="quick-link" href="#" data-url="https://news.ycombinator.com"><span class="ql-icon">Y</span>HN</a>
            <a class="quick-link" href="#" data-url="https://reddit.com"><span class="ql-icon">R</span>Reddit</a>
            <a class="quick-link" href="#" data-url="https://wikipedia.org"><span class="ql-icon">W</span>Wiki</a>
          </div>
        </div>`;
    }

    function focusStartSearch() {
      requestAnimationFrame(() => {
        const input = content.querySelector('.tab-content.active .start-search');
        if (input) input.focus();
      });
    }

    // ─── Navigate within active tab ───
    function navigate(url) {
      const tab = getActiveTab();
      if (!tab) return;
      let normalized = (url || '').trim();
      if (!normalized || normalized === 'about:start') {
        updateTabUrl(tab, 'about:start', 'New Tab');
        return;
      }
      if (!/^https?:\/\//i.test(normalized)) {
        if (/^[\w.-]+\.[a-z]{2,}/i.test(normalized)) {
          normalized = 'https://' + normalized;
        } else {
          normalized = 'https://www.google.com/search?q=' + encodeURIComponent(normalized);
        }
      }
      if (tab.historyIdx < tab.history.length - 1) {
        tab.history = tab.history.slice(0, tab.historyIdx + 1);
      }
      tab.history.push(normalized);
      tab.historyIdx++;
      updateTabUrl(tab, normalized, 'Loading...');
    }

    function updateTabUrl(tab, url, title) {
      const prevUrl = tab.url;
      tab.url = url;
      tab.title = title || tab.title;
      if (url === 'about:start') tab.favicon = '';
      broadcast('tab-url-changed', { id: tab.id, url, title: tab.title });
      save();

      const existing = content.querySelector(`.tab-content[data-content-id="${tab.id}"]`);
      if (url === 'about:start') {
        if (existing) existing.remove();
        const div = document.createElement('div');
        div.className = 'tab-content' + (tab.id === activeId ? ' active' : '');
        div.dataset.contentId = tab.id;
        div.innerHTML = buildStartPageHTML();
        content.appendChild(div);
        focusStartSearch();
      } else {
        const proxiedUrl = proxyUrl(url);
        if (existing) {
          existing.querySelectorAll('.tab-error').forEach(e => e.remove());
          let iframe = existing.querySelector('iframe');
          if (iframe) {
            iframe.style.display = '';
            iframe.src = proxiedUrl;
          } else {
            existing.innerHTML = '';
            iframe = document.createElement('iframe');
            iframe.src = proxiedUrl;
            iframe.setAttribute('sandbox', 'allow-scripts allow-forms allow-same-origin');
            iframe.loading = 'lazy';
            existing.appendChild(iframe);
            bindIframe(iframe, tab.id);
          }
        } else {
          const div = document.createElement('div');
          div.className = 'tab-content' + (tab.id === activeId ? ' active' : '');
          div.dataset.contentId = tab.id;
          const iframe = document.createElement('iframe');
          iframe.src = proxiedUrl;
          iframe.setAttribute('sandbox', 'allow-scripts allow-forms allow-same-origin');
          iframe.loading = 'lazy';
          div.appendChild(iframe);
          content.appendChild(div);
          bindIframe(iframe, tab.id);
        }
      }
      updateContentVisibility();
      renderTabs();
      syncAddressBar();
    }

    function goBack() {
      const tab = getActiveTab();
      if (!tab || tab.historyIdx <= 0) return;
      tab.historyIdx--;
      updateTabUrl(tab, tab.history[tab.historyIdx], '');
    }

    function goForward() {
      const tab = getActiveTab();
      if (!tab || tab.historyIdx >= tab.history.length - 1) return;
      tab.historyIdx++;
      updateTabUrl(tab, tab.history[tab.historyIdx], '');
    }

    function refresh() {
      const tab = getActiveTab();
      if (!tab || tab.url === 'about:start') return;
      const iframe = content.querySelector(`.tab-content.active iframe`);
      if (iframe) {
        iframe.src = proxyUrl(tab.url);
        toast('Refreshing');
      }
    }

    function showIframeError(tabId) {
      const container = content.querySelector(`.tab-content[data-content-id="${tabId}"]`);
      if (!container) return;
      const tab = tabs.find(t => t.id === tabId);
      if (!tab) return;
      if (container.querySelector('.tab-error')) return;
      const existing = container.querySelector('iframe');
      if (existing) existing.style.display = 'none';
      const err = document.createElement('div');
      err.className = 'tab-error';
      err.innerHTML = `
        <div class="err-icon">&#9888;</div>
        <div class="err-msg">This content couldn't be embedded — the site may block iframe loading.</div>
        <div class="err-url">${escapeHtml(tab.url)}</div>`;
      container.appendChild(err);
    }

    // ─── Proxy UI ───
    function updateProxyUI() {
      proxyToggle.classList.toggle('active', proxyEnabled && !!proxyServerUrl);
      proxyToggle.title = proxyEnabled && proxyServerUrl ? 'Proxy: On' : 'Proxy: Off';
      proxyUrlInput.value = proxyServerUrl;
      proxyToggleSwitch.classList.toggle('on', proxyEnabled);
    }

    // ─── Address Bar Sync ───
    function syncAddressBar() {
      const tab = getActiveTab();
      if (!tab) {
        urlInput.value = '';
        urlInput.placeholder = 'No tab open';
        urlIndicator.innerHTML = '';
        navBack.disabled = true;
        navFwd.disabled = true;
        return;
      }
      const displayUrl = tab.url === 'about:start' ? '' : tab.url;
      urlInput.value = displayUrl;
      urlInput.placeholder = 'Search or enter URL...';
      if (proxyEnabled && proxyServerUrl && tab.url !== 'about:start') {
        urlIndicator.innerHTML = '<span style="color:#6bba6b;font-size:9px;display:flex;align-items:center;gap:3px"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2l7 3v5c0 4-3 8-7 10-4-2-7-6-7-10V5l7-3z"/></svg>proxy</span>';
      } else {
        urlIndicator.innerHTML = '';
      }
      navBack.disabled = tab.historyIdx <= 0;
      navFwd.disabled = tab.historyIdx >= (tab.history.length - 1);
    }

    // ─── Context Menu ───
    function showContextMenu(e, tabId) {
      e.preventDefault();
      ctxMenu.innerHTML = `
        <div class="cm-item" data-action="duplicate" data-id="${tabId}">Duplicate Tab</div>
        <div class="cm-item" data-action="close-others" data-id="${tabId}">Close Others</div>
        <div class="cm-item" data-action="close-right" data-id="${tabId}">Close to the Right</div>
        <div class="cm-sep"></div>
        <div class="cm-item" data-action="reload-all">Reload All Tabs</div>`;
      const maxX = window.innerWidth - 180;
      const maxY = window.innerHeight - 140;
      ctxMenu.style.left = Math.min(e.clientX, maxX) + 'px';
      ctxMenu.style.top = Math.min(e.clientY, maxY) + 'px';
      ctxMenu.classList.add('show');
      const close = () => ctxMenu.classList.remove('show');
      setTimeout(() => document.addEventListener('click', close, { once: true }), 0);
    }

    ctxMenu.addEventListener('click', (e) => {
      const item = e.target.closest('.cm-item');
      if (!item) return;
      const action = item.dataset.action;
      const id = item.dataset.id;
      ctxMenu.classList.remove('show');
      switch (action) {
        case 'duplicate': {
          const src = tabs.find(t => t.id === id);
          if (src) addTab(src.url, src.title + ' (copy)');
          break;
        }
        case 'close-others': {
          const keep = tabs.find(t => t.id === id);
          if (!keep) break;
          const keepId = keep.id;
          tabs.forEach(t => { if (t.id !== keepId) removeContentFor(t.id); });
          tabs = [keep];
          activeId = keepId;
          broadcast('tabs-replaced', { tabs, activeId, idCounter });
          save();
          renderTabs();
          updateContentVisibility();
          syncAddressBar();
          break;
        }
        case 'close-right': {
          const idx = tabs.findIndex(t => t.id === id);
          if (idx === -1) break;
          tabs.slice(idx + 1).forEach(t => removeContentFor(t.id));
          tabs = tabs.slice(0, idx + 1);
          if (!tabs.some(t => t.id === activeId)) activeId = tabs[tabs.length - 1].id;
          broadcast('tabs-replaced', { tabs, activeId, idCounter });
          save();
          renderTabs();
          updateContentVisibility();
          syncAddressBar();
          break;
        }
        case 'reload-all':
          content.querySelectorAll('iframe').forEach(f => { f.src = f.src; });
          toast('Reloaded all tabs');
          break;
      }
    });

    // ─── Event Binding ───
    urlInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        navigate(urlInput.value);
        urlInput.blur();
      }
    });

    navBack.addEventListener('click', goBack);
    navFwd.addEventListener('click', goForward);
    navRefresh.addEventListener('click', refresh);
    newTabBtn.addEventListener('click', () => addTab());

    content.addEventListener('click', (e) => {
      const ql = e.target.closest('.quick-link');
      if (ql) { e.preventDefault(); navigate(ql.dataset.url); return; }
      const go = e.target.closest('.start-go');
      if (go) {
        const input = go.parentElement.querySelector('.start-search');
        if (input && input.value.trim()) navigate(input.value.trim());
      }
    });

    content.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const input = e.target.closest('.start-search');
        if (input && input.value.trim()) {
          e.preventDefault();
          navigate(input.value.trim());
        }
      }
    });

    // ─── Keyboard Shortcuts ───
    document.addEventListener('keydown', (e) => {
      const meta = e.metaKey || e.ctrlKey;

      if (meta && e.key === 't') { e.preventDefault(); addTab(); return; }
      if (meta && e.key === 'w') { e.preventDefault(); if (getActiveTab()) animateClose(activeId); return; }

      if (meta && e.key === 'Tab') {
        e.preventDefault();
        const dir = e.shiftKey ? -1 : 1;
        const idx = tabs.findIndex(t => t.id === activeId);
        const next = (idx + dir + tabs.length) % tabs.length;
        if (tabs[next]) switchTab(tabs[next].id);
        return;
      }

      if (meta && e.key === 'l') { e.preventDefault(); urlInput.focus(); urlInput.select(); return; }
      if (meta && e.key === 'r') { e.preventDefault(); refresh(); return; }

      if (meta && e.key >= '1' && e.key <= '9') {
        e.preventDefault();
        const idx = parseInt(e.key) - 1;
        if (idx < tabs.length) switchTab(tabs[idx].id);
        return;
      }

      if (e.key === 'Escape') ctxMenu.classList.remove('show');
    });

    // ─── Proxy Event Handlers ───
    proxyToggle.addEventListener('click', (e) => {
      e.stopPropagation();
      proxyConfig.classList.toggle('show');
    });

    document.addEventListener('click', (e) => {
      if (!proxyConfig.contains(e.target) && e.target !== proxyToggle) {
        proxyConfig.classList.remove('show');
      }
    });

    proxyToggleSwitch.addEventListener('click', () => {
      proxyEnabled = !proxyEnabled;
      saveProxyConfig();
      updateProxyUI();
      syncAddressBar();
      toast(proxyEnabled ? 'Proxy enabled' : 'Proxy disabled');
    });

    proxyUrlInput.addEventListener('change', () => {
      const val = proxyUrlInput.value.trim().replace(/\/+$/, '');
      if (val) {
        proxyServerUrl = val;
        saveProxyConfig();
        updateProxyUI();
        toast('Proxy server updated');
      }
    });

    // ─── Iframe URL sync via postMessage ───
    window.addEventListener('message', (e) => {
      if (e.data && e.data.type === 'pluto-url' && proxyEnabled) {
        const msgUrl = e.data.url;
        if (!msgUrl) return;
        // Extract the original URL from the proxy URL
        let originalUrl = msgUrl;
        const proxyPrefix = proxyServerUrl + '/proxy?url=';
        if (msgUrl.startsWith(proxyPrefix)) {
          try {
            originalUrl = decodeURIComponent(msgUrl.slice(proxyPrefix.length));
          } catch { return; }
        }
        const tab = getActiveTab();
        if (tab && originalUrl !== tab.url && originalUrl.startsWith('http')) {
          tab.url = originalUrl;
          tab.title = tab.title || originalUrl;
          broadcast('tab-url-changed', { id: tab.id, url: originalUrl, title: tab.title });
          save();
          renderTabs();
          syncAddressBar();
        }
      }
    });

    // ─── Helpers ───
    function escapeHtml(s) {
      const d = document.createElement('div');
      d.appendChild(document.createTextNode(s));
      return d.innerHTML;
    }
    function escapeAttr(s) {
      return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // ─── Init ───
    function init() {
      loadProxyConfig();

      // Auto-detect: if served from the proxy itself, use its origin (skip for file://)
      const proto = window.location.protocol;
      if (proto === 'file:') {
        console.warn('Pluto opened from file:// — iframe features are limited. Serve via HTTP or visit https://pluto.a.jrnm.app directly.');
        toast('Open via HTTP for full proxy support (file:// has restrictions)');
      }
      if (!proxyUrlInput.value && proto !== 'file:' && proto !== 'about:') {
        const currentOrigin = window.location.origin;
        if (currentOrigin && currentOrigin !== 'null') {
          fetch(currentOrigin + '/health').then(r => r.json()).then(data => {
            if (data.name === 'Pluto Proxy') {
              proxyServerUrl = currentOrigin;
              proxyUrlInput.value = proxyServerUrl;
              saveProxyConfig();
              updateProxyUI();
            }
          }).catch(() => {});
        }
      }

      if (!load()) {
        tabs = getDefaultTabs();
        activeId = tabs[0].id;
      }
      updateProxyUI();
      rebuildContent();
      renderTabs();
      syncAddressBar();
      scrollTabIntoView(activeId);
      if (getActiveTab()?.url !== 'about:start') urlInput.focus();
    }

    init();

    window.addEventListener('beforeunload', () => { CHANNEL.close(); });
  })();
</script>
</body>
</html>
